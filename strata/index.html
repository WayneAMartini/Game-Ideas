<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATA - Dig. Appraise. Sell. Go Deeper.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #333;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: default;
        }
        #audioHint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #555;
            font-size: 11px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="audioHint">Click to enable audio | F: Toggle sound</div>
    <script src="js/bundle.js"></script>
</body>
</html>
